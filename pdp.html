/* ====== PDP-specific layout ====== */
.page{padding-top:96px;padding-bottom:120px;min-height:100vh;background:var(--bg)}
.bcrumb{padding:24px 0 12px;font-size:12.5px;color:var(--ink-4);font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bcrumb a{color:var(--ink-3);transition:var(--tr-fast)}
.bcrumb a:hover{color:var(--green-deep)}
.bcrumb .sep{color:var(--ink-5)}

/* HERO */
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;padding:24px 0 56px;align-items:start}
.hero-gallery{position:sticky;top:96px}
.hero-img-main{
  width:100%;aspect-ratio:4/3;background:#fff;
  border:1px solid var(--bd);border-radius:var(--r-4);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  position:relative;box-shadow:var(--sh-2);
}
.hero-img-main img{width:100%;height:100%;object-fit:contain;padding:32px}
.hero-thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:10px;margin-top:14px}
.hero-thumb{
  aspect-ratio:1;background:var(--surface);border:1px solid var(--bd);
  border-radius:var(--r-2);overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:var(--tr-fast);
}
.hero-thumb:hover,.hero-thumb.active{border-color:var(--green);background:var(--surface)}
.hero-thumb img{width:100%;height:100%;object-fit:contain;padding:8px}
.hero-thumb-empty{font-size:14px;color:var(--ink-5)}

.hero-info-cat{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11.5px;font-weight:600;color:var(--green-deep);
  letter-spacing:.10em;text-transform:uppercase;
  background:var(--green-soft);border:1px solid var(--green-line);
  border-radius:var(--r-pill);padding:5px 12px;margin-bottom:18px;
}
.hero-info-name{
  font-family:var(--font-display);
  font-size:clamp(30px,3.6vw,46px);font-weight:700;
  line-height:1.04;letter-spacing:-.03em;margin-bottom:14px;color:var(--ink);
}
.hero-info-tagline{
  font-size:15px;color:var(--ink-3);font-weight:400;
  margin-bottom:24px;max-width:540px;line-height:1.6;
}
.hero-stats{
  display:flex;gap:24px;padding:18px 0;
  border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);
  margin-bottom:24px;
}
.hero-stat{flex:1}
.hero-stat-lbl{font-size:10.5px;font-weight:600;color:var(--ink-4);letter-spacing:.10em;text-transform:uppercase;margin-bottom:5px}
.hero-stat-val{font-size:14px;font-weight:600;color:var(--ink)}
.hero-stat-val.green{color:var(--green-deep)}
.hero-stat-val.orange{color:var(--orange)}

.hero-price-block{
  background:linear-gradient(180deg,#fff,var(--green-soft));
  border:1px solid var(--green-line);border-radius:var(--r-3);
  padding:24px;margin-bottom:18px;
}
.hero-price-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.hero-price{
  font-family:var(--font-display);
  font-size:34px;font-weight:700;color:var(--ink);letter-spacing:-.025em;line-height:1;
}
.hero-price small{font-size:14px;font-weight:400;color:var(--ink-4);letter-spacing:0;margin-left:4px}
.hero-price-disc{
  font-size:11.5px;color:var(--green-deep);font-weight:600;
  background:#fff;padding:5px 10px;border-radius:var(--r-pill);
  border:1px solid var(--green-line);
}
.hero-promo{font-size:13px;color:var(--ink-3);font-weight:400;margin-top:10px;padding-top:12px;border-top:1px dashed var(--green-line)}
.hero-promo strong{color:var(--green-deep);font-weight:600}

.hero-cta-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.hero-cta-add{
  flex:1;min-width:240px;font-family:var(--font-sans);
  font-size:14.5px;font-weight:600;color:#fff;
  background:var(--ink);border:none;border-radius:var(--r-pill);
  padding:14px 22px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:var(--tr);letter-spacing:-.005em;
}
.hero-cta-add:hover{background:#000;transform:translateY(-2px);box-shadow:0 14px 32px rgba(14,18,23,0.18)}
.hero-cta-add.added{background:var(--green-deep)}
.hero-cta-add.added:hover{box-shadow:0 14px 32px rgba(79,123,57,0.22)}
.hero-cta-book{
  font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--ink);
  background:var(--bg-2);border:1px solid var(--bd-strong);border-radius:var(--r-pill);
  padding:14px 22px;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;
  transition:var(--tr-fast);text-decoration:none;
}
.hero-cta-book:hover{background:var(--bg-3);border-color:var(--ink-4)}

.hero-trust{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.hero-trust-item{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-3);font-weight:500}
.hero-trust-ico{
  width:22px;height:22px;border-radius:50%;
  background:var(--green-soft);color:var(--green-deep);
  border:1px solid var(--green-line);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:700;
}

/* SECTIONS in product page */
.pdp-sec{padding:56px 0;border-top:1px solid var(--bd)}
.pdp-sec-hdr{margin-bottom:30px}
.pdp-sec-lbl{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--green-deep);margin-bottom:8px;display:block}
.pdp-sec-h2{font-family:var(--font-display);font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.025em;line-height:1.15;color:var(--ink)}
.pdp-sec-sub{font-size:14px;color:var(--ink-3);margin-top:8px;font-weight:400;max-width:600px;line-height:1.65}

/* SPECS bento grid */
.specs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.spec-card{
  background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-3);

.spec-card:hover{border-color:var(--bd-2);box-shadow:var(--sh-2)}
.spec-card::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--green) 0%,transparent 100%);opacity:.6;
}
.spec-ico{font-size:22px;margin-bottom:12px;display:block;opacity:.85}
.spec-lbl{font-size:10.5px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--ink-4);margin-bottom:6px}
.spec-val{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.35}
.spec-note{
  font-size:11.5px;color:var(--ink-4);margin-top:18px;font-style:italic;
  display:flex;align-items:center;gap:8px;
}

/* KELENGKAPAN */

.kel-item{

}
.kel-item:hover{background:var(--surface);border-color:var(--bd-2);box-shadow:var(--sh-1)}
.kel-check{

  background:var(--green-soft);color:var(--green-deep);
  border:1.5px solid var(--green);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;
}
.kel-name{font-size:13.5px;font-weight:500;color:var(--ink);line-height:1.4}

/* RELATED */
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.rel-card{
  background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-3);
  overflow:hidden;display:flex;flex-direction:column;transition:var(--tr);
  text-decoration:none;color:inherit;

.rel-card:hover{border-color:var(--bd-2);transform:translateY(-3px);box-shadow:var(--sh-3)}
.rel-img{
  aspect-ratio:1;background:var(--bg-2);
  display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;
}
.rel-img img{width:100%;height:100%;object-fit:contain;background:#fff;padding:18px}
.rel-img .prod-ph{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:14px;text-align:center;
  background:linear-gradient(135deg,#F5F6F2 0%,#EDEEE8 100%);
}
.rel-body{padding:16px}
.rel-cat{font-size:10px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--green-deep);margin-bottom:6px}
.rel-name{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:10px;color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px;letter-spacing:-.005em}
.rel-price{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.015em}
.rel-price small{font-size:10.5px;font-weight:400;color:var(--ink-4)}

.rec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.rec-card{
  display:block;text-decoration:none;color:inherit;
  background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-3);
  padding:22px 16px;text-align:center;transition:var(--tr-fast);

.rec-card:hover{border-color:var(--green-line);background:var(--green-soft);transform:translateY(-2px)}
.rec-ico{font-size:26px;margin-bottom:10px;opacity:.85}
.rec-name{font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:4px}
.rec-desc{font-size:11.5px;color:var(--ink-4);font-weight:400}

/* FAQ list (PDP) */
.faq-list{display:flex;flex-direction:column;gap:10px}
.faq-list .faq-item{
  background:var(--surface);border:1px solid var(--bd);border-radius:var(--r-3);
  padding:0;cursor:pointer;transition:var(--tr-fast);overflow:hidden;
}
.faq-list .faq-item:hover{border-color:var(--bd-2)}
.faq-list .faq-item.open{border-color:var(--green-line);box-shadow:var(--sh-2)}
.faq-list .faq-q{
  padding:20px 22px;font-size:14.5px;font-weight:600;color:var(--ink);
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.faq-list .faq-q::after{
  content:'+';width:26px;height:26px;border-radius:50%;background:var(--bg-2);
  color:var(--ink-3);font-size:16px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  transition:var(--tr-fast);line-height:1;flex-shrink:0;
}
.faq-list .faq-item.open .faq-q::after{transform:rotate(45deg);background:var(--green);color:#fff}
.faq-list .faq-a{
  font-size:13.5px;color:var(--ink-3);line-height:1.7;font-weight:400;
  padding:0 22px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;
}
.faq-list .faq-item.open .faq-a{max-height:300px;padding:0 22px 22px 22px}

/* MOBILE STICKY CTA */
.mobile-cta{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.96);backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);padding:12px 16px;display:none;
  align-items:center;gap:10px;z-index:999;
}
.mobile-cta-price{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--ink);flex-shrink:0;line-height:1;letter-spacing:-.02em}
.mobile-cta-price small{font-size:11px;color:var(--ink-4);font-weight:400}
.mobile-cta-add{
  flex:1;font-family:var(--font-sans);font-size:13px;font-weight:600;color:#fff;
  background:var(--ink);border:none;border-radius:var(--r-pill);padding:12px;cursor:pointer;
}
.mobile-cta .btn-p{padding:12px 18px}

/* PLACEHOLDER (light) */
.prod-ph-brand{font-size:11.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;line-height:1;color:var(--ink)}
.prod-ph-model{font-size:11.5px;color:var(--ink-3);font-weight:500;line-height:1.4;max-width:90%;overflow:hidden}
.prod-ph-ico{font-size:34px;opacity:.65}
.prod-ph::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,var(--ph-glow,rgba(142,198,78,0.18)) 0%,transparent 60%);pointer-events:none}
.prod-ph::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ph-bar,linear-gradient(90deg,transparent,rgba(142,198,78,.7),transparent))}

/* LOADING + ERROR */
.loading-state{padding:140px 0;text-align:center;color:var(--ink-4)}
.loading-state .spinner{width:24px;height:24px;margin:0 auto 16px;display:block}
.err-state{padding:100px 32px;text-align:center;max-width:560px;margin:0 auto}
.err-state h1{font-family:var(--font-display);font-size:30px;font-weight:700;margin-bottom:14px;color:var(--ink);letter-spacing:-.02em}
.err-state p{font-size:14.5px;color:var(--ink-3);margin-bottom:28px;line-height:1.65}

@media (max-width:960px){
  .hero-grid{grid-template-columns:1fr;gap:32px}
  .hero-gallery{position:static}
  .hero-cta-row{flex-direction:column}
  .hero-cta-book{justify-content:center}
  .mobile-cta{display:flex}
  .page{padding-bottom:90px}
  .pdp-sec{padding:40px 0}
}
@media (max-width:520px){
  .hero-stats{flex-wrap:wrap;gap:14px}
  .hero-stat{flex:1 1 calc(50% - 8px)}
}
</style>

  const rgb=b?b.rgb:(CAT_RGB[k]||'142,198,78');
  const label=b?b.label:(k?k.charAt(0)+k.slice(1).toLowerCase():'Gear');
  const model=cleanModel(name);
  return `<div class="prod-ph" style="--ph-glow:rgba(${rgb},0.18);--ph-bar:linear-gradient(90deg,transparent,rgba(${rgb},0.7),transparent)">
    <div class="prod-ph-ico">${getIcon(kat)}</div>
    <div class="prod-ph-brand" style="color:rgb(${rgb})">${escHtml(label)}</div>
    <div class="prod-ph-model">${escHtml(model)}</div></div>`;
}

function deriveSpecsFromName(nama, kat){
  const n = (nama||'').toLowerCase();
  const specs = {};
  if ((kat||'').toUpperCase()==='LENSA') {
    const focal = n.match(/(\d+)(?:-(\d+))?\s*mm/);
    if (focal) specs.focalLength = focal[2] ? `${focal[1]}–${focal[2]}mm zoom` : `${focal[1]}mm prime`;
    const ap = n.match(/f\s*\/?\s*(\d+(?:\.\d+)?)/i);
    if (ap) specs.maxAperture = `F${ap[1]}`;
    if (/for\s*sony|fe\s/.test(n)) specs.mount = 'Sony E-mount';
    else if (/for\s*canon|ef-?m/.test(n)) specs.mount = /ef-?m/.test(n)?'Canon EF-M':'Canon EF / EF-S';
    else if (/for\s*nikon/.test(n)) specs.mount = 'Nikon F';
    else if (/for\s*fuji|fujinon|xf\s/.test(n)) specs.mount = 'Fujifilm X';
    if (/gm|art|pro/.test(n)) specs.tier = 'Pro / G-Master';
    if (/oss|os\s|stm|usm/.test(n)) specs.stabilization = 'Optical stabilization';
    if (/macro/.test(n)) specs.special = 'Macro 1:1';
    return specs;
  }
  if ((kat||'').toUpperCase()==='LIGHTING') {
    const w = n.match(/(\d+)\s*w(?!h)/);
    if (w) specs.power = `${w[1]}W`;
    if (/rgb|rgbww|rgbaw/.test(n)) specs.colorMode = 'RGB Full-Color';
    else if (/bicolor|bi-color/.test(n)) specs.colorMode = 'Bicolor (3200K–5600K)';
    else if (/daylight|5600/.test(n)) specs.colorMode = 'Daylight 5600K';
    if (/led/.test(n)) specs.type = 'LED Continuous';
    else if (/flash|strobe|tt|ad\d/.test(n)) specs.type = 'Strobe / Flash';
    if (/bowens/.test(n)) specs.mount = 'Bowens';
    return specs;
  }
  if ((kat||'').toUpperCase()==='AUDIO SUPPORT' || /mic|lavalier|shotgun|wireless|saramonic|rode|hollyland|boya/.test(n)) {
    if (/lark|blink|wireless|w-?\d/.test(n)) specs.type = 'Wireless Lavalier';
    else if (/shotgun|ntg/.test(n)) specs.type = 'Shotgun Condenser';
    else if (/clip\s*on|lavalier|by-m1/.test(n)) specs.type = 'Lavalier (Clip-on)';
    else specs.type = 'Audio Capture';
    return specs;
  }
  if ((kat||'').toUpperCase()==='KAMERA') {
    if (/drone|mini|mavic|phantom|air/.test(n)) specs.type = 'Drone (Aerial Camera)';
    else if (/insta360|gopro|hero|pocket/.test(n)) specs.type = 'Action / 360° Camera';
    else if (/cinema|fx\d|red |alexa/.test(n)) specs.type = 'Cinema Camera';
    else specs.type = 'Mirrorless / DSLR';
    if (/full\s*frame|a7|a9|fx3|fx9|6d|5d|r5|r6/.test(n)) specs.sensor = 'Full-Frame';
    else if (/aps-?c|a6\d|x-?[ts]\d|m\d|650d|750d|800d/.test(n)) specs.sensor = 'APS-C';
    if (/4k/.test(n)) specs.video = '4K Video';
    return specs;
  }
  if ((kat||'').toUpperCase()==='VIDEO SUPPORT') {
    if (/tripod/.test(n)) specs.type = 'Tripod';
    else if (/gimbal|crane|weebill|ronin|zhiyun|feiyu|smooth/.test(n)) specs.type = 'Gimbal Stabilizer';
    else if (/slider/.test(n)) specs.type = 'Camera Slider';
    else if (/monitor|feelworld|atem/.test(n)) specs.type = 'Monitor / Recorder';
    else if (/cable|hdmi/.test(n)) specs.type = 'Cable / Connector';
    else if (/battery|np-/.test(n)) specs.type = 'Battery';
    else if (/charger/.test(n)) specs.type = 'Charger';
    else if (/sd\s*card|sdcard|memory|cf/.test(n)) specs.type = 'Memory Card';
    else specs.type = 'Video Accessory';
    return specs;
  }
  return {};
}

function getSpecs(nama, kat){
  const slug = slugify(cleanModel(nama));
  if (SPECS_DB[slug]) return {specs:SPECS_DB[slug], source:'curated'};
  const lower = (nama||'').toLowerCase();
  for (const k in SPECS_DB) {
    if (lower.includes(k)) return {specs:SPECS_DB[k], source:'curated'};
  }
  return {specs:deriveSpecsFromName(nama, kat), source:'derived'};
}

  {q:'Apakah bisa antar-jemput?',a:'Tersedia antar-jemput di area Bandung Kota dengan ongkos sesuai jarak. Untuk pickup mandiri di lokasi Cisaranten / Sriwijaya, gratis. Detail antar-jemput hubungi WhatsApp.'},
  {q:'Bagaimana jika gear rusak atau hilang saat penyewaan?',a:'Customer bertanggung jawab atas kerusakan / kehilangan unit. Kami sediakan opsi insurance untuk gear high-value (Sony FX3, DJI Mini 4 Pro, dll). Setiap gear di-cek sebelum & sesudah sewa.'},
  {q:'Apakah ada training atau tutorial untuk gear ini?',a:'Untuk gear teknis (cinema camera, gimbal pro, lighting RGB), tim kami beri quick-onboarding 5–10 menit gratis sebelum unit diserahkan. Tersedia juga video tutorial di YouTube channel @7summitscamera.'}
];

const slug = (location.pathname.match(/\/product\/([^\/?#]+)/) || [])[1] || new URLSearchParams(location.search).get('slug') || '';

async function loadProduct(){
  const root = document.getElementById('product-content');
  // If pre-rendered (build-time static file already has full content), skip refetch.
  if (root && root.querySelector('.hero-grid')) { wireUpPrerendered(); return; }
  if (!slug) { renderError('URL tidak valid', 'Slug produk tidak ditemukan di URL.'); return; }
  try {
    const { data: produkAll, error: e1 } = await sbB.from('produk')
      .select('id,nama_produk,kategori_produk,harga_sewa_per_hari,kelengkapan,stok_total,stok_dalam_perbaikan,cabang_id')
      .eq('is_deleted', false).eq('status', 'active');
    if (e1 || !produkAll) { renderError('Gagal memuat data', e1?.message || 'No data'); return; }
    const target = produkAll.find(p => slugify(p.nama_produk) === slug);
    if (!target) { renderError('Produk tidak ditemukan', `Slug "${slug}" tidak cocok dengan produk apapun di katalog.`); return; }
    const { data: enrich } = await sb.from('product_enrichments')
      .select('*').eq('booking_product_id', target.id).maybeSingle();
    const otherIds = produkAll.filter(p => p.id !== target.id).slice(0, 50).map(p => p.id);
    let otherEnrich = {};
    if (otherIds.length) {
      const { data: extra } = await sb.from('product_enrichments').select('*').in('booking_product_id', otherIds);
      if (extra) extra.forEach(e => otherEnrich[e.booking_product_id] = e);
    }
    renderProduct(target, enrich || {}, produkAll, otherEnrich);
  } catch(e) {
    console.error(e);
    renderError('Error tidak terduga', e.message || String(e));
  }
}

function renderError(title, body){
  document.getElementById('product-content').innerHTML = `
    <div class="err-state">
      <h1>${escHtml(title)}</h1>
      <p>${escHtml(body)}</p>
      <a href="/" class="btn btn-primary">← Kembali ke Home</a>
    </div>`;
  document.getElementById('bcrumb-name').textContent = title;
}

function renderProduct(p, en, all, otherEnrich){
  const nama = p.nama_produk;
  const kat = p.kategori_produk || '';
  const harga = p.harga_sewa_per_hari || 0;
  const stok = (p.stok_total||0) - (p.stok_dalam_perbaikan||0);
  const avail = stok > 0;
  const kelArr = (en.includes || p.kelengkapan || '').split(/[,;·]+/).map(s => s.trim()).filter(Boolean);
  const imgUrl = en.image_url || '';
  const allImages = [en.image_url, en.image_url_2, en.image_url_3, en.image_url_4, en.image_url_5, en.image_url_6].filter(Boolean);
  const brandName = detectBrand(nama)?.label || '';
  const cabang = p.cabang_id || '-';
  const descSeo = en.description || `Sewa ${cleanModel(nama)}${brandName ? ' — ' + brandName : ''} di Bandung. ${kat ? kat.charAt(0)+kat.slice(1).toLowerCase()+', p' : 'P'}rofesional, unit terjaga. Harga Rp ${Number(harga).toLocaleString('id-ID')}/hari. Promo 3 hari bayar 2, hemat 33%. Antar via ojek online ke seluruh Bandung. Cek ketersediaan di booking.sewakamerabandung.id.`;
  const desc = descSeo;

  const nameClean = cleanModel(nama);
  document.title = `Sewa ${nameClean} Bandung — 7summits Camera | Rp ${Number(harga).toLocaleString('id-ID')}/hari`;
  document.querySelector('meta[name="description"]').setAttribute('content', desc.substring(0, 160));

  function setMeta(prop, val, isName){
    const attr = isName ? 'name' : 'property';
    let el = document.querySelector(`meta[${attr}="${prop}"]`);
    if (!el) { el = document.createElement('meta'); el.setAttribute(attr, prop); document.head.appendChild(el); }
    el.setAttribute('content', val);
  }
  setMeta('og:title', `Sewa ${nameClean} Bandung — 7summits Camera`);
  setMeta('og:description', desc.substring(0, 160));
  setMeta('og:url', location.href);
  if (imgUrl) setMeta('og:image', imgUrl);
  setMeta('twitter:title', `Sewa ${nameClean} Bandung`, true);
  setMeta('twitter:description', desc.substring(0, 160), true);

  let canonical = document.querySelector('link[rel="canonical"]');
  if (!canonical) { canonical = document.createElement('link'); canonical.rel = 'canonical'; document.head.appendChild(canonical); }
  canonical.href = location.href;

  document.getElementById('bcrumb-name').textContent = nameClean;

  // Product schema
  const ldProduct = document.createElement('script');
  ldProduct.type = 'application/ld+json';
  ldProduct.textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@type': 'Product',
    name: nameClean,
    description: desc.substring(0, 300),
    image: imgUrl || undefined,
    sku: String(p.id),
    category: kat,
    brand: brandName ? {'@type': 'Brand', name: brandName} : undefined,
    offers: {
      '@type': 'Offer',
      priceCurrency: 'IDR',
      price: harga,
      priceValidUntil: '2027-12-31',
      availability: avail ? 'https://schema.org/InStock' : 'https://schema.org/OutOfStock',
      itemCondition: 'https://schema.org/UsedCondition',
      url: location.href,
      seller: {'@type': 'LocalBusiness', name: '7summits Camera', url: 'https://sewakamerabandung.id', telephone: '+6281121114410'}
    }
  });
  document.head.appendChild(ldProduct);

  // BreadcrumbList schema
  const ldBreadcrumb = document.createElement('script');
  ldBreadcrumb.type = 'application/ld+json';
  ldBreadcrumb.textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@type': 'BreadcrumbList',
    itemListElement: [
      {'@type': 'ListItem', position: 1, name: 'Home', item: 'https://sewakamerabandung.id'},
      {'@type': 'ListItem', position: 2, name: kat || 'Gear', item: `https://sewakamerabandung.id/katalog${kat ? '?cat=' + encodeURIComponent(kat) : ''}`},
      {'@type': 'ListItem', position: 3, name: nameClean, item: location.href}
    ]
  });
  document.head.appendChild(ldBreadcrumb);

  // FAQPage schema from the generic FAQ list
  const ldFaq = document.createElement('script');
  ldFaq.type = 'application/ld+json';
  ldFaq.textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@type': 'FAQPage',
    mainEntity: FAQ_GENERIC.map(f => ({
      '@type': 'Question',
      name: f.q,
      acceptedAnswer: {'@type': 'Answer', text: f.a}
    }))
  });
  document.head.appendChild(ldFaq);

  _currentProduct = {id:p.id, slug:slugify(nama), name:nama, kategori:kat, harga, image:imgUrl};

  const {specs, source: specSource} = getSpecs(nama, kat);
  const specsHtml = Object.keys(specs).length
    ? Object.entries(specs).map(([k,v]) => `
      <div class="spec-card">
        <span class="spec-ico">${SPEC_ICONS[k] || '•'}</span>
        <div class="spec-lbl">${SPEC_LABELS[k] || k}</div>
        <div class="spec-val">${escHtml(v)}</div>
      </div>`).join('') + `
      <div class="spec-note" style="grid-column:1/-1">${specSource==='curated'?'✓ Spesifikasi dari katalog produk resmi':'⚙ Spesifikasi auto-derived dari nama model — kontak kami untuk konfirmasi detail teknis'}</div>`
    : '<div style="grid-column:1/-1;text-align:center;color:var(--ink-4);padding:40px">Spesifikasi belum tersedia. Hubungi kami untuk detail.</div>';

  const kelHtml = kelArr.length
    ? kelArr.map(k => `<div class="kel-item"><div class="kel-check">✓</div><div class="kel-name">${escHtml(k)}</div></div>`).join('')
    : '<div style="grid-column:1/-1;text-align:center;color:var(--ink-4);padding:40px;font-size:13px">Kelengkapan standar — hubungi tim untuk daftar lengkap.</div>';

  const related = all.filter(x => x.id !== p.id && x.kategori_produk === kat).slice(0, 8);
  const relatedHtml = related.length
    ? related.map(r => {
        const rEn = otherEnrich[r.id] || {};
        const rImg = rEn.image_url || '';
        const rSlug = slugify(r.nama_produk);
        return `<a href="/product/${rSlug}" class="rel-card">
          <div class="rel-img">${rImg ? `<img src="${escHtml(rImg)}" alt="${escHtml(r.nama_produk)}" loading="lazy" onerror="this.outerHTML=this.dataset.fb" data-fb='${escHtml(buildPlaceholder(r.nama_produk, r.kategori_produk))}'>` : buildPlaceholder(r.nama_produk, r.kategori_produk)}</div>
          <div class="rel-body">
            <div class="rel-cat">${escHtml(r.kategori_produk||'')}</div>
            <div class="rel-name">${escHtml(cleanModel(r.nama_produk))}</div>
            <div class="rel-price">${fmtRp(r.harga_sewa_per_hari)} <small>/ hari</small></div>
          </div>
        </a>`;
      }).join('')
    : '<div style="grid-column:1/-1;color:var(--ink-4);text-align:center;padding:30px">Tidak ada produk serupa.</div>';

  const recs = REC_RULES[kat.toUpperCase()] || REC_RULES.LAINNYA;
  const recsHtml = recs.map(r => `
    <a href="/#produk" class="rec-card">
      <div class="rec-ico">${r.ico}</div>
      <div class="rec-name">${escHtml(r.name)}</div>
      <div class="rec-desc">${escHtml(r.desc)}</div>
    </a>`).join('');

  const faqHtml = FAQ_GENERIC.map((f) => `
    <div class="faq-item" onclick="this.classList.toggle('open')">
      <div class="faq-q">${escHtml(f.q)}</div>
      <div class="faq-a">${escHtml(f.a)}</div>
    </div>`).join('');

  const heroImgHtml = imgUrl
    ? `<img src="${escHtml(imgUrl)}" alt="${escHtml(nama)}" onerror="this.outerHTML=this.dataset.fb" data-fb='${escHtml(buildPlaceholder(nama, kat))}'>`
    : buildPlaceholder(nama, kat);

  const inCart = (window.sc7Cart?.read?.() || []).some(x => x.id === p.id);

  document.getElementById('product-content').innerHTML = `
  <section class="hero-grid">
    <div class="hero-gallery">
      <div class="hero-img-main" id="pdp-main-img">${heroImgHtml}</div>
      <div class="hero-thumbs">
        ${allImages.length ? allImages.map((src,i) => `<div class="hero-thumb${i===0?' active':''}" onclick="pdpSwapImg('${escHtml(src)}',this)"><img src="${escHtml(src)}" alt="thumb ${i+1}"></div>`).join('') : `<div class="hero-thumb active"><div class="hero-thumb-empty">—</div></div><div class="hero-thumb"><div class="hero-thumb-empty">+</div></div><div class="hero-thumb"><div class="hero-thumb-empty">+</div></div><div class="hero-thumb"><div class="hero-thumb-empty">+</div></div>`}
      </div>
    </div>

    <div class="hero-info">
      <div class="hero-info-cat">${getIcon(kat)} ${escHtml(kat)}</div>
      <h1 class="hero-info-name">${escHtml(cleanModel(nama))}</h1>
      <p class="hero-info-tagline">${escHtml(desc)}</p>

      <div class="hero-stats">
        <div class="hero-stat"><div class="hero-stat-lbl">Status</div><div class="hero-stat-val ${avail?'green':'orange'}">${avail?'● Tersedia':'● Stok Habis'}</div></div>
        <div class="hero-stat"><div class="hero-stat-lbl">Stok</div><div class="hero-stat-val">${Math.max(0,stok)} unit</div></div>
        <div class="hero-stat"><div class="hero-stat-lbl">Lokasi</div><div class="hero-stat-val" style="text-transform:capitalize">${escHtml(cabang)}</div></div>
      </div>

      <div class="hero-price-block">
        <div class="hero-price-row">
          <div class="hero-price">${fmtRp(harga)} <small>/ hari</small></div>
          <div class="hero-price-disc">3 hari = bayar 2 hari</div>
        </div>
        <div class="hero-promo">💡 <strong>Hemat 33%</strong> untuk sewa 3+ hari berturut. Berlaku semua produk tanpa minimum order.</div>
      </div>

      <div class="hero-cta-row">
        <button id="cta-add" class="hero-cta-add ${inCart?'added':''}" onclick="addThisToCart()">
          ${inCart ? '✓ Sudah di Daftar Inquiry' : '＋ Tambah ke Daftar Inquiry'}
        </button>
        <a class="hero-cta-book" href="${BOOKING_HREF}" target="_blank">📅 Booking Langsung</a>
      </div>

      <div class="hero-trust">
        <div class="hero-trust-item"><div class="hero-trust-ico">✓</div>Unit ter-quality control</div>
        <div class="hero-trust-item"><div class="hero-trust-ico">✓</div>Antar-jemput area Bandung</div>
        <div class="hero-trust-item"><div class="hero-trust-ico">✓</div>Quick onboarding gear</div>
        <div class="hero-trust-item"><div class="hero-trust-ico">✓</div>Promo 3 bayar 2 aktif</div>
      </div>
    </div>
  </section>

  <section class="pdp-sec" id="spec">
    <div class="pdp-sec-hdr">
      <span class="pdp-sec-lbl">Spesifikasi</span>
      <h2 class="pdp-sec-h2">Spec teknis ${escHtml(detectBrand(nama)?.label || '')}</h2>
      <p class="pdp-sec-sub">Detail teknis lengkap untuk pertimbangan produksi profesional. Bento grid siap di-skim cepat.</p>
    </div>
    <div class="specs-grid">${specsHtml}</div>
  </section>

  <section class="pdp-sec" id="kelengkapan">
    <div class="pdp-sec-hdr">
      <span class="pdp-sec-lbl">Kelengkapan</span>
      <h2 class="pdp-sec-h2">Yang termasuk dalam sewa</h2>
      <p class="pdp-sec-sub">Semua item di bawah ini sudah termasuk dalam harga sewa harian. Tidak ada biaya tersembunyi.</p>
    </div>
    <div class="kel-grid">${kelHtml}</div>
  </section>

  <section class="pdp-sec" id="related">
    <div class="pdp-sec-hdr">
      <span class="pdp-sec-lbl">Lihat Juga</span>
      <h2 class="pdp-sec-h2">Produk serupa di kategori ${escHtml(kat)}</h2>
    </div>
    <div class="rel-grid">${relatedHtml}</div>
  </section>

  <section class="pdp-sec" id="recommend">
    <div class="pdp-sec-hdr">
      <span class="pdp-sec-lbl">Recommendation</span>
      <h2 class="pdp-sec-h2">Gear pendukung yang sering disewa bareng</h2>
      <p class="pdp-sec-sub">Setup profesional jarang berdiri sendiri. Gear-gear berikut paling sering disewa bersama produk kategori ini.</p>
    </div>
    <div class="rec-grid">${recsHtml}</div>
  </section>

  <section class="pdp-sec" id="faq">
    <div class="pdp-sec-hdr">
      <span class="pdp-sec-lbl">FAQ</span>
      <h2 class="pdp-sec-h2">Pertanyaan yang sering ditanya</h2>
    </div>
    <div class="faq-list">${faqHtml}</div>
  </section>
  `;

  if (!document.querySelector('.mobile-cta')) {
    const m = document.createElement('div');
    m.className = 'mobile-cta';
    m.innerHTML = `
      <div class="mobile-cta-price">${fmtRp(harga)} <small>/hari</small></div>
      <button class="mobile-cta-add" onclick="document.getElementById('cta-add').click()">＋ Inquiry</button>
      <a class="btn-p" href="${BOOKING_HREF}" target="_blank">Booking →</a>`;
    document.body.appendChild(m);
  }
}

window.pdpSwapImg = function(src, el) {
  const main = document.getElementById('pdp-main-img');
  if (main) main.innerHTML = `<img src="${src}" alt="">`;
  document.querySelectorAll('.hero-thumb').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
};

// Wire up the inquiry-cart integration when the page is build-time pre-rendered.
function wireUpPrerendered(){
  // Pull product data from the embedded JSON-LD (Product schema) the prerender wrote
  try {
    const lds = document.querySelectorAll('script[type="application/ld+json"]');
    for (const s of lds) {
      const j = JSON.parse(s.textContent);
      if (j && j['@type'] === 'Product') {
        _currentProduct = {
          id: j.sku || '',
          slug: (location.pathname.match(/\/product\/([^/?#]+)/)||[])[1] || slugify(j.name||''),
          name: j.name || '',
          kategori: j.category || '',
          harga: (j.offers && j.offers.price) || 0,
          image: Array.isArray(j.image) ? j.image[0] : (j.image || '')
        };
        break;
      }
    }
  } catch(e){}
  // If already in cart, mark the CTA
  if (_currentProduct && window.sc7Cart) {
    const inCart = (sc7Cart.read() || []).some(x => x.id === _currentProduct.id);
    if (inCart) {
      const btn = document.getElementById('cta-add');
      if (btn) { btn.classList.add('added'); btn.innerHTML = '✓ Sudah di Daftar Inquiry'; }
    }
  }
  // Mobile sticky CTA (matches dynamic render)
  if (!document.querySelector('.mobile-cta') && _currentProduct) {
    const m = document.createElement('div');
    m.className = 'mobile-cta';
    m.innerHTML = `<div class="mobile-cta-price">${fmtRp(_currentProduct.harga)} <small>/hari</small></div>
      <button class="mobile-cta-add" onclick="document.getElementById('cta-add').click()">＋ Inquiry</button>
      <a class="btn-p" href="${BOOKING_HREF}" target="_blank">Booking →</a>`;
    document.body.appendChild(m);
  }
}

let _currentProduct = null;
window.addThisToCart = function() {
  if (!_currentProduct) return;
  if (!window.sc7Cart) { setTimeout(addThisToCart, 100); return; }
  sc7Cart.add(_currentProduct);
  const btn = document.getElementById('cta-add');
  if (btn) { btn.classList.add('added'); btn.innerHTML = '✓ Sudah di Daftar Inquiry'; }
  setTimeout(() => sc7Cart.open(), 250);
};

loadProduct();
</script>
